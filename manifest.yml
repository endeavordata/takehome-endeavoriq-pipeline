# Source-faithfulness manifest — FILL THIS IN.
#
# For each source entity below, declare:
#   model:   the table/model in your DuckDB that is meant to be 1:1 faithful to that source
#   key:     that model's primary-key column
#   columns: map each canonical column (left) to YOUR column name (right)
#
# Our harness reads this and compares your tables to the true current source state: the set of
# keys (so deletes must be handled), row counts, and the values of the canonical columns. Naming
# and modeling are up to you — the manifest is how we line your columns up with ours.
#
# The canonical columns we check are listed for each entity. Replace every TODO.
sources:
  app.accounts:
    model: TODO
    key: TODO
    columns: {id: TODO, status: TODO}
