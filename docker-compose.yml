services:
  app-db:
    image: postgres:16
    container_name: endeavoriq-app-db
    environment:
      POSTGRES_USER: endeavoriq
      POSTGRES_PASSWORD: endeavoriq
      POSTGRES_DB: endeavoriq
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U endeavoriq"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  billing-api:
    image: ghcr.io/endeavordata/endeavoriq-billing-api:latest
    container_name: endeavoriq-billing-api
    ports:
      - "8080:8080"
    environment:
      BILLING_DB: /data/billing.db
    volumes:
      - ./billing:/data:ro

  # The data simulator (black box). Run via make seed / make tick — not a long-running service.
  # Pulled as a published image; you don't have (or need) its source.
  simulator:
    image: ghcr.io/endeavordata/endeavoriq-sim:latest
    depends_on:
      app-db:
        condition: service_healthy
    environment:
      PGHOST: app-db
      PGPORT: "5432"
      PGUSER: endeavoriq
      PGPASSWORD: endeavoriq
      PGDATABASE: endeavoriq
      DROP_DIR: /work/drop/usage
      BILLING_DB_PATH: /work/billing/billing.db
      STATE_DIR: /work/state
      GEN_SEED: "20260601"
    volumes:
      - ./:/work
    profiles: ["tools"]

volumes:
  pgdata:
